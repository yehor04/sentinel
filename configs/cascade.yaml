# Sentinel cascade thresholds + fusion weights.
#
# This file is the SINGLE SOURCE OF TRUTH for every numeric threshold used by
# the cascade. Constitution Principle V (Reproducibility Over Cleverness):
# "Every threshold lives in configs/; no floats in code."
#
# Calibration on the validation split (T047, Day 4) writes back to this file
# with the empirically-best values + per-seed mean/std. Hand-edits are valid
# during development; the calibrator preserves comments and key order.

verdict_thresholds:
  # Layer 2/3 confidence at or above this -> AUTO_CORRECT (inject correction).
  # Below 0.85, AUTO_CORRECT is forbidden by Decision schema invariant
  # (Constitution Principle III).
  auto_correct_min: 0.85

  # Layer 2/3 confidence BELOW this -> BLOCK (agent must revise plan).
  # Confidence in the [block_max, auto_correct_min) range -> SUGGEST.
  block_max: 0.60

fusion:
  # Layer 2 base = rescaled top-1 cosine. Three fusion features blended in
  # when confidence is in the ambiguous [block_max, auto_correct_min) range.
  # Weights MUST sum to 1.0 (validated at load time by config.py).
  base_weight: 0.5
  f1_weight: 0.2   # Levenshtein structural similarity
  f2_weight: 0.2   # Jaccard schema-key similarity
  f3_weight: 0.1   # top-1 vs top-2 similarity gap

  # F3 multiplier: scales (top1 - top2) gap before clipping to [0, 1].
  # 5.0 chosen so a typical-noise gap (0.05) maps to 0.25 confidence boost,
  # while gaps below noise floor stay near zero. See docs/blueprint.md §4.
  f3_multiplier: 5.0

latency:
  # Per-layer p95 latency ceilings in milliseconds. Build fails if any layer
  # exceeds these on `make bench-latency`. Cascade overall median <15ms.
  l1_p95_ms: 2.0
  l2_p95_ms: 20.0
  l3_p95_ms: 500.0

embedding:
  # Layer 2 embedding backend.
  #   'gemini'     - Google text-embedding-004 (768-dim, 1500 RPM free tier).
  #                  Sentinel's default — reliable, real semantic embeddings.
  #   'featherless' - OpenAI-compatible /v1/embeddings — NOT currently supported
  #                  by Featherless (returns 404). Class kept for future chat-
  #                  based pseudo-embedding fallback.
  #   'stub'       - deterministic hash-based pseudo-embedding, no I/O.
  #                  Used by tests and as a boot-safe fallback when no API
  #                  keys are configured.
  provider: gemini

  # Featherless model id — used only when provider='featherless'. Kept for
  # documentation; switch back if Featherless ever ships /v1/embeddings.
  featherless_model: BAAI/bge-small-en-v1.5

  # Gemini gemini-embedding-001: measured better than gemini-embedding-2 on
  # our specific phantom-tool corpus. Side-by-side on the canonical demo
  # phantom 'search_the_internet':
  #
  #   model                     | cosine→web_search | L2 latency
  #   gemini-embedding-001      | 0.86              | 267 ms
  #   gemini-embedding-2        | 0.84              | 1614 ms  (6× slower)
  #
  # Counter-intuitive: gemini-embedding-2 is the newer generation, but on
  # short tool-name signatures (5-30 chars) -001 produces SLIGHTLY tighter
  # cosines and is dramatically faster. -2 may shine on longer documents
  # (it has more capacity, 768-dim was a truncation of native 3072), but
  # for our short-text use case the extra capacity is wasted and we pay
  # the latency cost.
  #
  # Available alternatives on v1beta (verified via genai.list_models()):
  #   - gemini-embedding-001        (current default)
  #   - gemini-embedding-2          (slower, ~equivalent quality on our corpus)
  #   - gemini-embedding-2-preview  (cutting-edge, can change without notice)
  #
  # Re-evaluate this choice after T035 latency-gate benchmark on a larger
  # phantom corpus (SentinelBench-v1).
  gemini_model: gemini-embedding-001

  # On-disk LRU cache for embeddings. Survives daemon restarts; keyed by
  # (provider, model, text). Default points at /var/sentinel/ because the
  # production container runs as non-root `sentinel` (uid 10001) with
  # --no-create-home — so $HOME (/home/sentinel) is NOT writable. The named
  # docker volume sentinel-data mounts at /var/sentinel/ already chowned
  # sentinel:sentinel (Dockerfile.backend), so the cache survives container
  # rebuilds. Override with SENTINEL_EMBED_CACHE for local dev.
  cache_dir: /var/sentinel/embed-cache
  cache_size_mb: 512

  # httpx timeout in seconds. Below this, fall back to gemini OR escalate.
  timeout_s: 5.0

verifier:
  # Layer 3 semantic verifier — fires only when Layer 2 confidence is in the
  # ambiguous window [block_max, auto_correct_min). 'gemini' uses Gemini
  # Flash via google-generativeai SDK. 'stub' returns None (cascade degrades
  # to Layer 2 decision) — used by tests and as a boot-safe fallback when
  # GEMINI_API_KEY is missing.
  provider: gemini

  # gemini-2.5-flash — restored after switching from google.generativeai SDK
  # to direct httpx REST calls on 2026-05-18. The deprecated SDK caused 504
  # DeadlineExceeded on all Flash models from the Vultr Milan node; the REST
  # API works cleanly. 2.5-flash gives the best reasoning quality for L3.
  gemini_model: gemini-2.5-flash

  # Structured-output strictness. Temperature 0 keeps the verifier
  # deterministic-ish so the same phantom yields the same correction.
  temperature: 0.0

  # Hard timeout in seconds. On timeout the cascade falls back to the
  # Layer 2 decision with degraded=True; the agent still gets a Decision.
  # 8.0s gives gemini-2.0-flash comfortable headroom (P95 ~2s on free tier).
  timeout_s: 8.0

  # Cap on the verifier's output to bound cost. The Decision schema also
  # caps `reason` at 240 chars. 1024 gives headroom since gemini-2.5-flash
  # with thinkingBudget=0 outputs the JSON directly without thinking preamble.
  max_output_tokens: 1024
