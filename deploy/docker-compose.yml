services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: sentinel-backend
    restart: unless-stopped
    # env_file passes the entire .env contents directly into the container's
    # environment. This makes `docker compose up` work without first having
    # to `set -a; source .env; set +a` in the shell — durable across reboots.
    env_file:
      - ../.env
    # Container-level overrides (explicit > env_file). Anything declared here
    # wins over the same key in .env. Keeping these makes the container env
    # contract explicit and self-documenting.
    environment:
      - SENTINEL_PORT=7777
      - SENTINEL_DB_PATH=/var/sentinel/sentinel.db
    volumes:
      - sentinel-data:/var/sentinel
    expose:
      - "7777"
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:7777/health',timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontend dashboard — Day 4 ships this. Day 1 leaves it commented so the
  # backend can deploy alone for the pipeline-clear smoke test.
  # frontend:
  #   build:
  #     context: ..
  #     dockerfile: deploy/Dockerfile.frontend
  #   container_name: sentinel-frontend
  #   restart: unless-stopped
  #   environment:
  #     - NEXT_PUBLIC_SENTINEL_API=https://${SENTINEL_DOMAIN}
  #   expose:
  #     - "3000"
  #   networks:
  #     - sentinel-net
  #   depends_on:
  #     - backend

  caddy:
    image: caddy:2-alpine
    container_name: sentinel-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    # Caddy reads SENTINEL_DOMAIN from container env for the Caddyfile's
    # {$SENTINEL_DOMAIN} placeholder. env_file ensures we don't depend on
    # the shell sourcing .env before `docker compose up`.
    env_file:
      - ../.env
    networks:
      - sentinel-net
    depends_on:
      - backend

networks:
  sentinel-net:
    driver: bridge

volumes:
  sentinel-data:
  caddy-data:
  caddy-config:
